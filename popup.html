<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 220px; padding: 15px; font-family: 'Segoe UI', Tahoma, sans-serif; }
    button { width: 100%; padding: 10px; margin-top: 8px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; font-size: 13px;}
    #startBtn { background: #107c41; color: white; }
    #stopBtn { background: #d83b01; color: white; display: none; }
    #exportBtn { background: #0078d4; color: white; margin-top: 20px;}
    #clearBtn { background: #f3f2f1; color: #323130; border: 1px solid #8a8886; }
    .stats { margin-top: 15px; font-size: 15px; text-align: center; padding: 10px; background: #f3f2f1; border-radius: 4px;}
  </style>
</head>
<body>
  <h3 style="margin-top: 0; text-align: center; font-size: 16px;">Manual Scraper</h3>
  
  <button id="startBtn">▶ Start Recording</button>
  <button id="stopBtn">⏹ Stop Recording</button>
  
  <div class="stats">
    Files Collected: <strong id="count">0</strong>
  </div>
  
  <button id="exportBtn">Download CSV</button>
  <button id="clearBtn">Clear Memory</button>
  
  <script src="popup.js"></script>
</body>
</html>
